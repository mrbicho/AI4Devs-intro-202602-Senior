<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reverse String</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 24px;
        line-height: 1.4;
      }
      main {
        max-width: 720px;
      }
      .row {
        display: flex;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      input[type="text"] {
        flex: 1;
        min-width: 260px;
        padding: 10px 12px;
        font-size: 16px;
      }
      button {
        padding: 10px 14px;
        font-size: 16px;
        cursor: pointer;
      }
      #result {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        min-height: 22px;
        white-space: pre-wrap;
      }
      .hint {
        color: #555;
        font-size: 14px;
        margin-top: 6px;
      }
      .switch {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        user-select: none;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Reverse String</h1>
      <p>
        Introduce un texto y elige si quieres invertir en <strong>tiempo real</strong> o
        usando el botón.
      </p>

      <div class="row">
        <input
          id="textInput"
          type="text"
          placeholder="Ej: AI4Devs"
          autocomplete="off"
        />

        <!-- Switch / selector para modo tiempo real -->
        <label class="switch" for="realtimeToggle">
          <input id="realtimeToggle" type="checkbox" />
          Tiempo real
        </label>

        <!-- Botón: aparece solo si hay >= 4 caracteres y el modo tiempo real está OFF -->
        <button id="reverseBtn" type="button">Invertir</button>
      </div>

      <div class="hint">
        - El botón aparece solo con <strong>más de 3 caracteres</strong>.<br />
        - En modo botón, también puedes pulsar <strong>Enter</strong>.
      </div>

      <h2>Resultado</h2>
      <div id="result" aria-live="polite"></div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
